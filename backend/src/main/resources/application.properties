# ── Server ────────────────────────────────────────────────
server.port=8080

# ── Session ───────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── App name ──────────────────────────────────────────────
spring.application.name=CipherShare

# ── Logging ───────────────────────────────────────────────
logging.level.com.ciphershare=INFO

# ── Firebase Storage ───────────────────────────────────────
# Format: your-project-id.appspot.com  (or the bucket name from Firebase Console → Storage)
# Leave blank to disable Storage upload (files stored locally only)
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
